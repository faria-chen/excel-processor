<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 待收款处理工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Microsoft YaHei', sans-serif; }
        .container { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .upload-area { border: 3px dashed #667eea; border-radius: 15px; padding: 50px; text-align: center; cursor: pointer; transition: all 0.3s; background: #f8f9fa; }
        .upload-area:hover { border-color: #764ba2; background: #e9ecef; }
        .upload-area.dragover { border-color: #28a745; background: #d4edda; }
        .upload-icon { font-size: 50px; margin-bottom: 20px; }
        #progress { display: none; }
        .alert { border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Excel 待收款处理工具</h1>
        <p class="subtitle">上传Excel文件，自动去重排序，含电话客户排每组末尾</p>
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <h4>点击或拖拽上传Excel文件</h4>
            <p class="text-muted">支持 .xlsx 和 .xls 格式</p>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display: none;">
        </div>
        <div id="progress" class="mt-4">
            <div class="progress"><div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 100%"></div></div>
            <p class="text-center mt-2" id="progressText">处理中...</p>
        </div>
        <div id="result" class="mt-4" style="display: none;"></div>
    </div>
    <script src="xlsx.full.min.js"></script>
    <script>
        const uploadArea=document.getElementById('uploadArea'),fileInput=document.getElementById('fileInput'),progress=document.getElementById('progress'),progressText=document.getElementById('progressText'),result=document.getElementById('result');
        uploadArea.addEventListener('click',()=>fileInput.click());
        uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.classList.add('dragover')});
        uploadArea.addEventListener('dragleave',()=>uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop',e=>{e.preventDefault();uploadArea.classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)handleFile(f)});
        fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)handleFile(f)});
        function handleFile(file){
            if(!file.name.match(/\.(xlsx|xls)$/)){showResult('error','❌ 请上传 Excel 文件 (.xlsx 或 .xls)');return}
            if(typeof XLSX==='undefined'){showResult('error','❌ SheetJS 库未加载');return}
            uploadArea.style.display='none';progress.style.display='block';result.style.display='none';
            const reader=new FileReader();
            reader.onload=function(e){
                try{
                    const data=new Uint8Array(e.target.result);
                    const wb=XLSX.read(data,{type:'array'});
                    const sn=wb.SheetNames[0];
                    const ws=wb.Sheets[sn];
                    const jsonData=XLSX.utils.sheet_to_json(ws,{header:1});
                    progressText.textContent='去重排序中...';
                    const processed=processData(jsonData);
                    progressText.textContent='生成文件中...';
                    const newWb=createWorkbook(processed,sn);
                    XLSX.writeFile(newWb,processed.fileName);
                    showResult('success','✅ 处理完成！<br><br>原始数据: '+processed.totalRows+' 条<br>去重后: '+processed.uniqueCustomers+' 个客户<br><br>文件已保存: <strong>'+processed.fileName+'</strong>');
                }catch(err){console.error(err);showResult('error','❌ 处理失败: '+err.message)}
                finally{progress.style.display='none';uploadArea.style.display='block';fileInput.value=''}
            };
            reader.readAsArrayBuffer(file)
        }
        function processData(jsonData){
            const dataRows=[];
            for(let i=3;i<jsonData.length;i++){const r=jsonData[i];if(r&&r[0]&&r[0]!=='合计')dataRows.push(r)}
            const seen=new Set(),deduped=[];
            for(const r of dataRows){const c=r[2];if(c&&!seen.has(c)){seen.add(c);deduped.push(r)}}
            const phoneRegex=/\d{8,}/;
            deduped.sort((a,b)=>{
                const hA=a[4]||'',hB=b[4]||'';
                if(hA!==hB)return hA.localeCompare(hB,'zh-CN');
                const pA=phoneRegex.test(a[2]||'')?1:0,pB=phoneRegex.test(b[2]||'')?1:0;
                if(pA!==pB)return pA-pB;
                return(a[2]||'').localeCompare(b[2]||'','zh-CN')
            });
            return{data:deduped,totalRows:dataRows.length,uniqueCustomers:deduped.length,fileName:fileInput.files[0].name.replace(/\.xlsx$/i,'_去重排序.xlsx')}
        }
        function createWorkbook(processed,sheetName){
            const wb=XLSX.utils.book_new(),ws={};
            ws['!cols']=[{wch:8},{wch:14},{wch:45},{wch:14},{wch:10}];
            ws['!merges']=[XLSX.utils.decode_range('A1:E1'),XLSX.utils.decode_range('A2:E2')];
            ws['A1']={v:'待收款',t:'s'};ws['A2']={v:'客户:    ',t:'s'};
            ['行号','单据日期','客户名称','收款期限','经手人'].forEach((h,i)=>{ws[XLSX.utils.encode_cell({r:2,c:i})]={v:h,t:'s'}});
            processed.data.forEach((row,i)=>{const rn=i+4;ws[XLSX.utils.encode_cell({r:rn-1,c:0})]={v:i+1,t:'n'};ws[XLSX.utils.encode_cell({r:rn-1,c:1})]={v:row[1],t:'s'};ws[XLSX.utils.encode_cell({r:rn-1,c:2})]={v:row[2],t:'s'};ws[XLSX.utils.encode_cell({r:rn-1,c:3})]={v:row[3],t:'s'};ws[XLSX.utils.encode_cell({r:rn-1,c:4})]={v:row[4],t:'s'}});
            const totalRow=processed.data.length+4;
            ws[XLSX.utils.encode_cell({r:totalRow-1,c:0})]={v:'合计',t:'s'};
            ws['!merges'].push(XLSX.utils.decode_range('A'+totalRow+':E'+totalRow));
            XLSX.utils.book_append_sheet(wb,ws,sheetName);return wb
        }
        function showResult(type,msg){result.className='alert alert-'+(type==='success'?'success':'danger');result.innerHTML=msg;result.style.display='block'}
    </script>
</body>
</html>
